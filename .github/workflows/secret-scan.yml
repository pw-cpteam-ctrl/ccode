name: Secret scan (push diff)

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan pushed diff for secret patterns
        id: scan
        run: |
          set -uo pipefail

          # 로컬 .claude-hooks/pre-commit과 동일한 패턴 (2차 방어선)
          pattern='(AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|ANTHROPIC_API_KEY[[:space:]]*=|sk-ant-[a-zA-Z0-9_-]{20,}|sk-[a-zA-Z0-9]{20,}|GITHUB_TOKEN[[:space:]]*=|ghp_[a-zA-Z0-9]{30,}|AIza[0-9A-Za-z_-]{35}|xox[baprs]-[0-9A-Za-z-]{10,})'

          before="${{ github.event.before }}"
          after="${{ github.event.after }}"

          # 새 브랜치 최초 push, 또는 force-push/리베이스로 before가 조상 커밋이 아니게 된 경우
          # 모두 "이전 커밋과 diff 불가" 상황이므로, 이번 push로 들어온 커밋(after) 자체를 스캔 대상으로 함
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${before}^{commit}" 2>/dev/null \
            && git merge-base --is-ancestor "$before" "$after" 2>/dev/null; then
            diff_output=$(git diff -U0 "$before" "$after" 2>/dev/null || true)
          else
            diff_output=$(git show "$after" 2>/dev/null || true)
          fi

          hits=$(printf '%s\n' "$diff_output" | grep -EnI "$pattern" || true)

          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${before}^{commit}" 2>/dev/null \
            && git merge-base --is-ancestor "$before" "$after" 2>/dev/null; then
            env_files=$(git diff --name-only "$before" "$after" 2>/dev/null | grep -E '(^|/)\.env(\..*)?$' || true)
          else
            env_files=$(git show --name-only --pretty=format: "$after" 2>/dev/null | grep -E '(^|/)\.env(\..*)?$' || true)
          fi

          if [ -z "$hits" ] && [ -z "$env_files" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"

          {
            echo "## 시크릿 패턴 매치"
            if [ -n "$hits" ]; then
              echo '```'
              # 실제 값은 마스킹: 매치된 패턴 자체는 가리고 파일 위치만 표시
              printf '%s\n' "$hits" | sed -E 's/^([^:]*:[0-9]+:).*/\1 [내용 마스킹됨 - 러너 로그에서만 확인 가능]/'
              echo '```'
            fi
            if [ -n "$env_files" ]; then
              echo ""
              echo "## .env 파일이 커밋됨"
              echo '```'
              printf '%s\n' "$env_files"
              echo '```'
            fi
          } > /tmp/secret_scan_summary.md

          cat /tmp/secret_scan_summary.md

      - name: Create issue on hit
        if: steps.scan.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/secret_scan_summary.md', 'utf8')
              + `\n\ncommit: ${context.sha}\nbranch: ${context.ref}\n\n`
              + `실제 매치 내용(값)은 이 이슈에 남기지 않았습니다. 필요하면 이 워크플로우 실행 로그에서 직접 확인한 뒤, 문제가 확인되면 해당 키를 즉시 폐기(rotate)하세요.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[secret-scan] 시크릿 의심 패턴 발견 - ${context.sha.substring(0, 7)}`,
              body,
              labels: ['secret-scan'],
            });

      - name: Fail job if secret found
        if: steps.scan.outputs.found == 'true'
        run: |
          echo "시크릿 의심 패턴이 발견되어 잡을 실패 처리합니다. 이슈를 확인하세요." >&2
          exit 1
