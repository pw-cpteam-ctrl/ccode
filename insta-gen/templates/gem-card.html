<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  /* 한/일 혼용 웹폰트. 네트워크 차단 시 시스템 CJK 폰트로 폴백 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+JP:wght@500;700;900&display=swap');

  :root {
    --badge-color: {{badge_color}};
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1080px; height: 1350px; }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans JP', 'WenQuanYi Zen Hei', sans-serif;
    width: 1080px; height: 1350px;
    position: relative; overflow: hidden;
    /* 어두운 그라데이션 배경 + 위쪽 살짝 밝은 비네팅 */
    background:
      radial-gradient(120% 80% at 50% 12%, #4a4744 0%, #38332f 38%, #211d1b 100%);
  }

  /* ── 상단 헤드라인 ── */
  .headline {
    position: absolute; top: 48px; left: 0; right: 0;
    text-align: center;
    color: #fff; font-weight: 900; font-size: 78px; letter-spacing: 2px;
    text-shadow: 0 2px 18px rgba(255,255,255,.25), 0 1px 2px rgba(0,0,0,.4);
  }

  /* ── 중앙 카드 ── */
  .card {
    position: absolute; top: 190px; left: 100px;
    width: 880px; height: 880px;
    border-radius: 40px; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
  }
  .card.pink {
    background:
      radial-gradient(140% 120% at 80% 10%, #ffffff 0%, #fdeef0 45%, #fbe2e8 100%);
  }
  .card.brown {
    background:
      radial-gradient(140% 120% at 50% 30%, #6a4d3c 0%, #543b2d 55%, #432e22 100%);
  }
  /* 카드 내부 패싯/스파클 장식 */
  .card .facets {
    position: absolute; inset: 0; opacity: .5;
    background:
      linear-gradient(135deg, rgba(255,255,255,.55) 0 14%, transparent 14% 30%),
      linear-gradient(45deg,  rgba(255,255,255,.35) 0 10%, transparent 10% 26%);
    background-position: top right, bottom left;
    background-size: 60% 60%, 50% 50%;
    background-repeat: no-repeat;
  }
  .card .sparkle { position: absolute; color: #d6b65e; font-size: 30px; opacity: .85; }

  /* 로고 영역 (좌상단) */
  .logos {
    position: absolute; top: 34px; left: 38px; z-index: 4;
    display: flex; align-items: center; gap: 18px;
  }
  .gem-logo {
    background: #111; color: #fff; border-radius: 6px;
    padding: 8px 14px; line-height: 1;
    font-weight: 900; font-style: italic; text-align: center;
  }
  .gem-logo .big { font-size: 30px; letter-spacing: 1px; }
  .gem-logo .sub { font-size: 13px; letter-spacing: 6px; margin-top: 3px; }
  .work-logo { max-height: 64px; max-width: 280px; }
  .work-logo-text { font-weight: 900; font-size: 30px; color: #c0392b; }

  /* 피규어 */
  .figure-wrap {
    position: absolute; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .figure-wrap img {
    max-width: 78%; max-height: 78%;
    object-fit: contain;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,.18));
  }

  /* 배지 (좌하단 팔각형) */
  .badge {
    position: absolute; left: 40px; bottom: 70px; z-index: 4;
    width: 132px; height: 132px;
    clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%);
    background: var(--badge-color);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
  }
  .badge .inner {
    width: 116px; height: 116px;
    clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%);
    background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
  }
  .badge .inner span {
    color: var(--badge-color); font-weight: 900; font-size: 26px; line-height: 1.1;
    font-family: 'Noto Sans JP','WenQuanYi Zen Hei',sans-serif;
  }

  /* 저작권 */
  .copyright {
    position: absolute; left: 0; right: 0; bottom: 24px; z-index: 4;
    text-align: center; font-size: 14px; color: #9a8f8a; line-height: 1.5;
  }
  .card.brown .copyright { color: #d8c8bd; }

  /* ── 카드 하단 타이틀 ── */
  .title {
    position: absolute; top: 1100px; left: 0; right: 0; text-align: center; color: #fff;
  }
  .title .work { font-weight: 900; font-size: 54px; letter-spacing: 1px; }
  .title .product { font-weight: 500; font-size: 42px; margin-top: 10px; color: #f0ece9; }

  /* 구분선 + 푸터 */
  .divider {
    position: absolute; top: 1248px; left: 180px; width: 720px; height: 1px;
    background: rgba(255,255,255,.28);
  }
  .footer {
    position: absolute; top: 1278px; left: 0; right: 0; text-align: center;
    color: #e8e3df; font-weight: 700; font-size: 38px; letter-spacing: 1px;
  }
  .pw-logo {
    position: absolute; right: 46px; bottom: 30px;
    font-weight: 900; font-size: 30px; color: #2f6fd6;
    background: #fff; border-radius: 8px; padding: 4px 10px;
  }
</style>
</head>
<body>
  <div class="headline">{{headline}}</div>

  <div class="card {{card_theme}}">
    <div class="facets"></div>
    <div class="sparkle" style="top:14%;left:10%">✦</div>
    <div class="sparkle" style="top:22%;right:9%;font-size:22px">✦</div>
    <div class="sparkle" style="top:60%;left:7%;font-size:22px">✦</div>
    <div class="sparkle" style="bottom:16%;right:10%">✦</div>

    <div class="logos">
      <div class="gem-logo"><div class="big">G.E.M.</div><div class="sub">Series</div></div>
      {{work_logo}}
    </div>

    <div class="figure-wrap"><img src="{{figure_src}}" style="{{figure_style}}"></div>

    <div class="badge"><div class="inner"><span>{{badge_top}}</span><span>{{badge_bottom}}</span></div></div>

    <div class="copyright">※画像は開発中のものです。<br>{{copyright}}</div>
  </div>

  <div class="title">
    <div class="work">{{work_name_kr}} G.E.M. 시리즈</div>
    <div class="product">{{product_kr}}</div>
  </div>

  <div class="divider"></div>
  <div class="footer">메가하우스 공식 스토어</div>
  <div class="pw-logo">PW:</div>
</body>
</html>
